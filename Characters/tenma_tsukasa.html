<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenma Tsukasa - Character Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700;800;900&display=swap');

        :root {
            --genshin-gold: #ffcc33;
            --glow: rgba(255, 187, 0, 0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #scaling-wrapper {
            width: 95vw;
            max-width: 1400px;
            aspect-ratio: 16 / 9;
            position: relative;
        }

        .gacha-container {
            width: 100%;
            height: 100%;
            background: #fff;
            background-image: radial-gradient(circle at 30% 50%, #fff 0%, #fff9e6 40%, #FFDD80 100%);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            container-type: size;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .header-tag {
            position: absolute;
            top: 2cqw;
            left: 2cqw;
            background: #fb0;
            color: white;
            padding: 0.4cqw 2cqw;
            border-radius: 2cqw;
            font-size: 1.1cqw;
            font-weight: 700;
            z-index: 10;
        }

        .title-group {
            position: absolute;
            top: 10%;
            left: 5%;
            z-index: 10;
            max-width: 35%;
        }

        .title-group h1 {
            font-size: 5cqw;
            font-weight: 900;
            color: #333;
            line-height: 1;
            margin-bottom: 0.5cqw;
        }

        .title-group h2 {
            font-size: 5.5cqw;
            font-weight: 900;
            background: linear-gradient(to bottom, #ffbb00, #e6a800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .guarantee-box {
            position: absolute;
            top: 45%;
            left: 5%;
            background: #ffbb00c0;
            color: white;
            padding: 1.5cqw 2.5cqw;
            width: 30%;
            font-size: 1.2cqw;
            font-weight: 600;
            z-index: 10;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%);
        }

        .desc-text {
            position: absolute;
            top: 62%;
            left: 5%;
            width: 30%;
            color: #666;
            font-size: 1.1cqw;
            line-height: 1.4;
            z-index: 10;
        }

        .character-stage {
            position: absolute;
            inset: 0;
            z-index: 5;
            pointer-events: none;
        }

        .char-wrapper {
            position: absolute;
            height: 100%;
            width: 100%;
            transition: transform 0.1s ease-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-1.2cqw); }
        }

        .main-char {
            right: 20%;
            top: 5%;
            height: 150%;
            z-index: 10;
            filter: drop-shadow(0 0 20px var(--glow));
            animation: float 5s ease-in-out infinite;
        }

        .sub-chars-group {
            position: absolute;
            right: 0;
            top: 0;
            width: 40%;
            height: 100%;
            z-index: 5;
        }

        .sub-char {
            position: absolute;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        .sc-1 { right: -5%; top: 5%; height: 50%; animation: float 6s ease-in-out infinite 0.5s; }
        .sc-2 { right: 7.5%; bottom: 25%; height: 50%; animation: float 7s ease-in-out infinite 1s; }
        .sc-3 { right: 0%; bottom: -5%; height: 50%; animation: float 5.5s ease-in-out infinite 0.2s; }

        .nameplate-anchor {
            position: absolute;
            bottom: 18%;
            right: 28%;
            z-index: 20;
            text-align: left;
        }

        .name-row {
            display: flex;
            align-items: center;
            gap: 1cqw;
        }

        .name-txt {
            font-size: 6cqw;
            font-weight: 900;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
        }

        .up-tag {
            background: #ffcc00;
            color: #443300;
            padding: 0.1cqw 0.8cqw;
            font-weight: 900;
            font-size: 1.2cqw;
            border-radius: 0.4cqw;
            box-shadow: 0 0 10px white;
        }

        .stars {
            color: var(--genshin-gold);
            font-size: 2cqw;
            margin-top: -1cqw;
            filter: drop-shadow(0 0 5px orange);
        }

        .title-badge {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            color: white;
            padding: 0.2cqw 1.5cqw;
            border-radius: 2cqw;
            font-size: 1.3cqw;
            font-weight: 600;
            margin-top: 0.5cqw;
            display: inline-block;
        }

        .bottom-right-actions {
            position: absolute;
            bottom: 5%;
            right: 5%;
            display: flex;
            gap: 1.5cqw;
            z-index: 30;
        }

        .wish-btn {
            background: linear-gradient(to bottom, #fcfaf5, #e0d8c8);
            border: 2px solid #d3bc8e;
            color: #745131;
            padding: 0.8cqw 4cqw;
            border-radius: 5cqw;
            font-weight: 800;
            font-size: 1.4cqw;
            cursor: pointer;
            box-shadow: 0 4px 0 #d3bc8e, 0 10px 20px rgba(0,0,0,0.15);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .wish-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #d3bc8e;
        }

        .wish-btn-gold {
            background: linear-gradient(to bottom, #f5f1e9, #ece5d8);
        }
    </style>
</head>

<body>

    <div id="scaling-wrapper">
        <div class="gacha-container">
            <canvas id="particleCanvas"></canvas>
            
            <div class="header-tag">Tenma Tsuakasa Wish! ☆</div>

            <div class="title-group">
                <h1>Wanderlust</h1>
                <h2>Invocation</h2>
            </div>

            <div class="guarantee-box">
                ✦ Every 10 wishes is guaranteed to include at least one 4-star or higher item.
            </div>

            <p class="desc-text">
                Standard wishes have no time limit. View Details for more.
            </p>

            <div class="character-stage">
                <div class="char-wrapper" id="parallaxLayer">
                    <!-- Five Star -->
                    <div class="main-char absolute">
                        <img src="https://i.postimg.cc/MpLLHmky/Tsukasa_Main.png" alt="Tsukasa Main" class="h-full">
                    </div>
                    
                    <!-- Four Stars -->
                    <div class="sub-chars-group">
                        <img src="https://i.postimg.cc/jS1124Vq/Tsukasa_3.png" class="sub-char sc-1" alt="Sub 1">
                        <img src="https://i.postimg.cc/Cx225H33/Tsukasa_2.png" class="sub-char sc-2" alt="Sub 2">
                        <img src="https://i.postimg.cc/NjnnFkhw/Tsukasa_1.png" class="sub-char sc-3" alt="Sub 3">
                    </div>
                </div>
            </div>

            <div class="nameplate-anchor">
                <div class="name-row">
                    <span class="name-txt">Tsukasa</span>
                    <span class="up-tag">UP!</span>
                </div>
                <div class="stars">★★★★★</div>
                <div class="title-badge">World Future Star</div>
            </div>

            <!-- Gambling -->
            <div class="bottom-right-actions">
                <button class="wish-btn" onclick="wish(1)">Wish x1</button>
                <button class="wish-btn wish-btn-gold" onclick="wish(10)">Wish x10</button>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center backdrop-blur-md">
        <div class="bg-white p-10 rounded-2xl text-center shadow-2xl scale-0 transition-transform duration-300" id="modal-box">
            <h3 class="text-3xl font-black mb-6" id="modal-text"></h3>
            <button onclick="closeModal()" class="bg-yellow-500 text-white px-8 py-3 rounded-full font-bold shadow-lg active:scale-95">Huzzah!</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            particles = Array.from({length: 30}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                s: Math.random() * 2 + 1,
                v: Math.random() * 0.4 + 0.1,
                o: Math.random() * 0.5 + 0.2
            }));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 230, 150, ${p.o})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2);
                ctx.fill();
                p.y -= p.v;
                if(p.y < -10) p.y = canvas.height + 10;
            });
            requestAnimationFrame(animate);
        }

        window.onload = () => { init(); animate(); };
        window.onresize = init;

        document.addEventListener('mousemove', (e) => {
            const wrapper = document.getElementById('parallaxLayer');
            const rect = document.querySelector('.gacha-container').getBoundingClientRect();
            
            const moveX = (e.clientX - (rect.left + rect.width / 2)) / (rect.width / 2);
            const moveY = (e.clientY - (rect.top + rect.height / 2)) / (rect.height / 2);
            
            wrapper.style.transform = `translate(${moveX * 15}px, ${moveY * 15}px)`;
        });

        function wish(num) {
            document.getElementById('modal-text').innerText = `Gambled: ×${num} ☆\nPretend there's stuff here`;
            document.getElementById('modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('modal-box').classList.add('scale-100'), 10);
        }

        function closeModal() {
            document.getElementById('modal-box').classList.remove('scale-100');
            setTimeout(() => document.getElementById('modal').classList.add('hidden'), 300);
        }
    </script>
</body>

</html>
